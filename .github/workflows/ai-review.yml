name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai

      - name: Get PR diff
        run: gh pr diff ${{ github.event.pull_request.number }} > pr.diff
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run AI review
        run: python .github/scripts/review.py
        env:
          GITHUB_TOKEN: ${{ secrets.MODELS_TOKEN }}

      - name: Post review comment
        if: always()
        run: gh pr comment ${{ github.event.pull_request.number }} --body-file review_output.md
        env:
          GH_TOKEN: ${{ github.token }}
